<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PCS SM Madeiras</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B8963E; --gold-light: #D4AF6A; --gold-pale: #F0E4C8;
    --beige: #F5F0E8; --beige-dark: #D6C9B0;
    --gray-900: #1C1A17; --gray-700: #3D3A35; --gray-500: #6B6560; --gray-300: #B0A99F;
    --white: #FAFAF8; --red: #C0392B; --green: #4A7C59;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-900);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(184,150,62,0.03) 60px, rgba(184,150,62,0.03) 120px);
  }
  body::after {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(184,150,62,0.08) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 420px;
    max-width: 95vw;
  }

  .login-brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-brand-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(184,150,62,0.4);
    padding: 4px 14px;
    margin-bottom: 14px;
  }
  .login-brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.1;
  }
  .login-brand h1 span { color: var(--gold-light); }
  .login-brand p {
    font-size: 12px;
    color: var(--gray-300);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .login-card {
    background: var(--white);
    border: 1px solid var(--beige-dark);
    border-radius: 2px;
    padding: 36px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .login-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--gray-900);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--beige-dark);
  }

  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gray-500); margin-bottom: 7px;
  }
  .form-input {
    width: 100%; padding: 11px 14px;
    background: var(--beige); border: 1px solid var(--beige-dark);
    border-radius: 2px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--gray-700); outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input:focus { border-color: var(--gold); background: var(--white); }
  .form-input::placeholder { color: var(--gray-300); font-style: italic; }

  .btn-login {
    width: 100%; padding: 13px;
    background: var(--gold); color: var(--gray-900);
    border: none; border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover { background: var(--gold-light); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .forgot-link {
    display: block; text-align: center;
    font-size: 12px; color: var(--gray-300);
    margin-top: 14px; text-decoration: none;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--gold); }

  .error-msg {
    background: #FEE; border: 1px solid #F5B7B1;
    border-left: 3px solid var(--red);
    padding: 10px 14px; border-radius: 2px;
    font-size: 12px; color: var(--red);
    margin-bottom: 16px; display: none;
  }

  .success-msg {
    background: #E8F4EC; border: 1px solid #A9D4B8;
    border-left: 3px solid var(--green);
    padding: 10px 14px; border-radius: 2px;
    font-size: 12px; color: var(--green);
    margin-bottom: 16px; display: none;
  }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--gray-500);
  }

  .loading-overlay {
    position: fixed; inset: 0; background: rgba(28,26,23,0.8);
    z-index: 999; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .loading-overlay.show { opacity: 1; pointer-events: all; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(184,150,62,0.2);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Forgot password view */
  #forgot-view { display: none; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="login-wrap">
  <div class="login-brand">
    <div class="login-brand-badge">Instituto Primazia</div>
    <h1>Sistema <span>PCS</span></h1>
    <p>SM Madeiras e Laminados Ltda · Aripuanã · 2026</p>
  </div>

  <div class="login-card">

    <!-- LOGIN VIEW -->
    <div id="login-view">
      <div class="login-card-title">Acesso ao Sistema</div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-input" id="email" placeholder="seu@institutoprimazia.com.br" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" class="form-input" id="senha" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-login" id="btnLogin" onclick="fazerLogin()">Entrar no Sistema</button>
      <a href="#" class="forgot-link" onclick="mostrarEsqueci(event)">Esqueci minha senha</a>
    </div>

    <!-- FORGOT VIEW -->
    <div id="forgot-view">
      <div class="login-card-title">Recuperar Senha</div>
      <div class="error-msg" id="forgotError"></div>
      <div class="success-msg" id="forgotSuccess"></div>
      <div class="form-group">
        <label class="form-label">Seu e-mail</label>
        <input type="email" class="form-input" id="forgotEmail" placeholder="seu@institutoprimazia.com.br" />
      </div>
      <button class="btn-login" onclick="recuperarSenha()">Enviar link de recuperação</button>
      <a href="#" class="forgot-link" onclick="voltarLogin(event)">← Voltar para o login</a>
    </div>

  </div>

  <div class="login-footer">
    Sistema exclusivo · Instituto Primazia © 2026
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // Redirect if already logged in
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = "dashboard.html";
  });

  function setLoading(v) {
    document.getElementById('loadingOverlay').classList.toggle('show', v);
    document.getElementById('btnLogin').disabled = v;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(id) { document.getElementById(id).style.display = 'none'; }

  function fazerLogin() {
    hideError('errorMsg');
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    if (!email || !senha) { showError('errorMsg', 'Preencha e-mail e senha.'); return; }
    setLoading(true);
    auth.signInWithEmailAndPassword(email, senha)
      .then(cred => {
        // Salva/atualiza dados do usuário no Firestore
        const uid = cred.user.uid;
        const perfil = PERFIS[email] || { nome: email, role: 'user' };
        return db.collection('users').doc(uid).set({
          email, nome: perfil.nome, role: perfil.role,
          ultimoAcesso: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      })
      .then(() => window.location.href = 'dashboard.html')
      .catch(err => {
        setLoading(false);
        const msgs = {
          'auth/user-not-found': 'E-mail não encontrado.',
          'auth/wrong-password': 'Senha incorreta.',
          'auth/invalid-email': 'E-mail inválido.',
          'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.',
          'auth/invalid-credential': 'E-mail ou senha incorretos.'
        };
        showError('errorMsg', msgs[err.code] || 'Erro ao fazer login. Verifique seus dados.');
      });
  }

  function mostrarEsqueci(e) {
    e.preventDefault();
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('forgot-view').style.display = 'block';
  }

  function voltarLogin(e) {
    e.preventDefault();
    document.getElementById('forgot-view').style.display = 'none';
    document.getElementById('login-view').style.display = 'block';
  }

  function recuperarSenha() {
    hideError('forgotError');
    document.getElementById('forgotSuccess').style.display = 'none';
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showError('forgotError', 'Informe seu e-mail.'); return; }
    auth.sendPasswordResetEmail(email)
      .then(() => {
        const s = document.getElementById('forgotSuccess');
        s.textContent = 'Link enviado! Verifique seu e-mail (incluindo a pasta de spam).';
        s.style.display = 'block';
      })
      .catch(() => showError('forgotError', 'E-mail não encontrado no sistema.'));
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-view').style.display !== 'none') fazerLogin();
  });
</script>
</body>
</html>
